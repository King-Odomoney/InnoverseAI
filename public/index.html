<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnoverseAI - YouTube Chapter Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 InnoverseAI</h1>
            <p class="tagline">Innovation Across the Universe</p>
        </header>

        <div class="tool-card">
            <h2>🎬 YouTube Chapter Generator</h2>
            <p class="description">Paste any YouTube URL to get timestamped chapters in seconds</p>

            <div class="input-group">
                <input
                    type="text"
                    id="videoUrl"
                    placeholder="https://www.youtube.com/watch?v=..."
                    autocomplete="off"
                >
                <button onclick="generateChapters()" id="generateBtn">
                    ⚡ Generate Chapters
                </button>
            </div>

            <div id="loading" class="loading" style="display:none;">
                <div class="spinner"></div>
                <p>Analyzing video transcript…</p>
            </div>

            <div id="result" class="result-area">
                <div class="placeholder">
                    <span>📝</span>
                    <p>Your chapters will appear here</p>
                </div>
            </div>
        </div>

        <footer>
            <p>🔹 Built with ❤️ in Nigeria 🔹</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
